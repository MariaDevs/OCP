<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#022c22"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="url(#bg)" stroke="#065f46" stroke-width="1.5"/>

  <!-- 12 Incan sun rays -->
  <g transform="translate(40,40)" filter="url(#glow)">
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(30)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(60)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(90)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(120)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(150)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(180)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(210)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(240)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(270)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(300)"/>
    <polygon points="0,-35 2.8,-21 -2.8,-21" fill="url(#gold)" opacity="0.95" transform="rotate(330)"/>
  </g>

  <!-- Inner ring -->
  <circle cx="40" cy="40" r="19.5" fill="#071525" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>

  <!-- Diamond suit -->
  <polygon points="40,25 52,40 40,55 28,40" fill="url(#emerald)"/>
  <polygon points="40,27 50,40 40,39 30,40" fill="white" opacity="0.13"/>
</svg>
