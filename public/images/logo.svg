<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <!-- Emerald gradient for icon bg -->
    <radialGradient id="iconBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#022c22"/>
    </radialGradient>
    <!-- Gold gradient for rays -->
    <linearGradient id="goldRay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Emerald gradient for diamond -->
    <linearGradient id="emeraldDiamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <!-- Text gradient gold -->
    <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.2   0 0 0 0 0.9   0 0 0 0 0.5   0 0 0 0.4 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════ ICON MARK ═══════════════════════════════ -->
  <!-- Outer circle background -->
  <circle cx="40" cy="40" r="37" fill="url(#iconBg)" stroke="#065f46" stroke-width="1"/>

  <!-- Incan sun rays (12 rays, alternating long/short) -->
  <g transform="translate(40,40)" filter="url(#glow)">
    <!-- Long rays -->
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(30)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(60)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(90)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(120)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(150)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(180)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(210)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(240)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(270)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(300)"/>
    <polygon points="0,-34  2.5,-20  -2.5,-20" fill="url(#goldRay)" opacity="0.95" transform="rotate(330)"/>
  </g>

  <!-- Inner gold ring -->
  <circle cx="40" cy="40" r="19" fill="#0a1628" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>

  <!-- Diamond (card suit) — center piece -->
  <g filter="url(#softGlow)">
    <polygon
      points="40,24  51,40  40,56  29,40"
      fill="url(#emeraldDiamond)"
    />
    <!-- Diamond highlight -->
    <polygon
      points="40,26  49,40  40,38  31,40"
      fill="white"
      opacity="0.12"
    />
    <!-- Diamond inner line detail -->
    <line x1="40" y1="26" x2="40" y2="54" stroke="white" stroke-width="0.4" opacity="0.3"/>
    <line x1="30" y1="40" x2="50" y2="40" stroke="white" stroke-width="0.4" opacity="0.3"/>
  </g>

  <!-- ═══════════════════════════════ WORDMARK ═══════════════════════════════ -->
  <!-- "Casino" in white -->
  <text
    x="90"
    y="34"
    font-family="'Segoe UI', 'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="-0.5"
    fill="white"
  >Casino</text>

  <!-- "Perú" in gold gradient -->
  <text
    x="90"
    y="34"
    font-family="'Segoe UI', 'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="-0.5"
    fill="url(#textGold)"
    dx="78"
  >Perú</text>

  <!-- .com in emerald, smaller -->
  <text
    x="90"
    y="34"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-weight="600"
    font-size="10"
    fill="#10b981"
    dx="152"
    dy="2"
  >.com</text>

  <!-- Tagline -->
  <text
    x="91"
    y="54"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-weight="400"
    font-size="9.5"
    letter-spacing="2.5"
    fill="#6b7280"
  >GUÍA INDEPENDIENTE • DESDE 2020</text>

  <!-- Thin separator line between Casino and Perú wordmark -->
  <!-- Decorative dot accent under the name -->
  <circle cx="172" cy="38" r="1.5" fill="#10b981" opacity="0.6"/>
</svg>
