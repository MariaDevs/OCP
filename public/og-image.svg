<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#071525"/>
      <stop offset="100%" stop-color="#0a1a0e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#022c22"/>
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Icon circle -->
  <circle cx="600" cy="185" r="70" fill="url(#iconBg)" stroke="#059669" stroke-width="3"/>

  <!-- Diamond ♦ in icon -->
  <polygon points="600,138 638,185 600,232 562,185" fill="#34d399"/>
  <polygon points="600,141 635,185 600,207 565,185" fill="white" opacity="0.12"/>

  <!-- 12 sun rays around icon -->
  <g transform="translate(600,185)">
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(30)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(60)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(90)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(120)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(150)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(180)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(210)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(240)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(270)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(300)"/>
    <polygon points="0,-78 3.5,-62 -3.5,-62" fill="#f59e0b" opacity="0.85" transform="rotate(330)"/>
  </g>

  <!-- Wordmark: Casino (white) + Perú (gold) + .com (emerald) -->
  <text x="600" y="320" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="88" letter-spacing="-3">
    <tspan fill="white">Casino</tspan><tspan fill="#f59e0b">Perú</tspan><tspan fill="#10b981" font-size="44" dy="8">.com</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="1">Guía Independiente de Casinos Online en Perú</text>

  <!-- Stats bar -->
  <rect x="300" y="418" width="600" height="80" rx="16" fill="rgba(255,255,255,0.04)" stroke="#10b981" stroke-opacity="0.2" stroke-width="1"/>
  <!-- 50+ Casinos -->
  <text x="420" y="452" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="26" font-weight="900" fill="#10b981">50+</text>
  <text x="420" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Casinos</text>
  <!-- Divider -->
  <line x1="540" y1="430" x2="540" y2="486" stroke="#1e293b" stroke-width="1"/>
  <!-- Yape & Plin -->
  <text x="600" y="452" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="20" font-weight="900" fill="#10b981">Yape &amp; Plin</text>
  <text x="600" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Métodos de Pago</text>
  <!-- Divider -->
  <line x1="660" y1="430" x2="660" y2="486" stroke="#1e293b" stroke-width="1"/>
  <!-- 2026 -->
  <text x="780" y="452" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="26" font-weight="900" fill="#10b981">2026</text>
  <text x="780" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Actualizado</text>

  <!-- Bottom URL -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569" letter-spacing="3">ONLINECASINOPERU.COM</text>
</svg>
