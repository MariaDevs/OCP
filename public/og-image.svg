      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#071525"/>
      <stop offset="100%" stop-color="#0a1a0e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
