    <polygon points="0,-122 5.5,-97 -5.5,-97" fill="#f59e0b" opacity="0.9" transform="rotate(60)"/>
    <polygon points="0,-122 5.5,-97 -5.5,-97" fill="#f59e0b" opacity="0.9" transform="rotate(90)"/>
    <polygon points="0,-122 5.5,-97 -5.5,-97" fill="#f59e0b" opacity="0.9" transform="rotate(120)"/>
    <polygon points="0,-122 5.5,-97 -5.5,-97" fill="#f59e0b" opacity="0.9" transform="rotate(150)"/>
    <polygon points="0,-122 5.5,-97 -5.5,-97" fill="#f59e0b" opacity="0.9" transform="rotate(180)"/>
